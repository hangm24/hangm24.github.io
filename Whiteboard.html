<!DOCTYPE html>
<!--WHITEBOARD-->
<html>
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mathscape</title>

	<link rel="stylesheet" href="blaze.css">
<script>MathJax = {tex: {inlineMath: {'[+]': [['ƒ', 'ƒ']]}}};</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-chtml.js"></script>
</head>
<body onload="runClock()">
	<textarea class="myconsole" id="myconsole" rows="5" cols="15" readonly></textarea>

	<div class="container">
	<div class="layer-top" id="drawing-board" inert>
		<canvas class="cvs" id="cvs"></canvas>
	</div>



	<div class="statebar" id="statebar" inert>
		<output style="float: left"></output>
		<output id="displayclock" style="float: right"></output>
	</div>

	<div class="navbar" id="navbar">
		<input type='file' id="rawdata" accept=".html">
		<button id="import" onclick="document.querySelector('#rawdata').click()" disabled>Import</button>
		<button id="exportlog" disabled>Export Log</button>
		<input type="text" id="commandline" placeholder="[Press Enter to Command]" onfocus="this.placeholder=''" onblur="this.placeholder='[Press Enter to Command]'">
		<button id="hand" disabled>🖐</button>
		<button id="pencil" disabled>🖊️</button>
		<button id="highlighter" disabled>🖍️</button>
		<input id="palette" name='stroke' type="color" value="#580D8B" disabled>
		<input id="lineWidthIn" name='lineWidth' type="number" value="7" disabled>
		<button id="backwardbtn" disabled>◀</button>
		<button id="forwardbtn" disabled>▶</button>
		<button id="smoothen" disabled>∿</button>
		<button id="straighten" disabled>╱</button>
		<button id="undo" disabled>↺</button>
		<button id="clear" disabled>🆑</button>
		<button id="stylusbtn" disabled><input type="radio" id="stylusonly" disabled>&nbsp&nbspStylus Only</button>
	</div>

	<div class="layer-bottom" id="layer-bottom">
	</div>


	</div><!--End of container-->

<script src="sapphire.js">


</script>



</body>
</html>
