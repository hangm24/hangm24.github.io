<!DOCTYPE html>	
<html lang="en">

<style>
@import url(https://fonts.googleapis.com/css?family=Andika|Boogaloo);
body {
	position: absolute;
	display:flex;
	margin: 0;
	left: 0;
	top: 0;
	width: 100%;
	height: 100%;
	background-color: #452D2F;
	box-sizing: border-box;
	justify-content: center; 
	align-items: center;
	font-family: Andika;
}

div.layer-top {justify-content: center; align-items: center}
canvas {background-color: #FFF9F4;height: min(98vh,57vw); width: min(172vh,98.6vw);}

#navbar {
	z-index: 1;
	width: min(155vh,90vw);
	font-family: Andika;
	font-size: 2.6vh;
	position: absolute;
	bottom: 1vh;
	background: #99BBEE;
	font-size: max(14px,2vh);
	opacity: 0.92;
	padding: 0.2%;
	padding-bottom: 0.3em;
	padding-left: 1em;
	padding-right: 1em;
	border-radius: 1em;
	vertical-align: baseline;
}

</style>
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no"	/>
	<title>Canvas</title>
</head>

<body>
	<div class=""layer-top" id="drawing-board" inert>
		<canvas id="cvs">Sorry, your browser is too old for the canvas.</canvas>
	</div>
	<div id="navbar">
		Hello
		<input type="text" id="commandline" placeholder="[Please Enter to Chat]" onfocus="this.placeholder=''" onblur="this.placeholder='[Please Enter to Chat]'">
		<button id="hand" disabled>🖐</button>
		<button id="pencil">🖊️</button>
		<button id="highlighter">🖍️</button>
		<input id="palette" name="stroke" type="color" value="#580D8B">
		<input id="lineWidthIn" name="lineWidth" type="number" value="7">
		<button id="stylusbtn"><input type="radio" id="stylusonly">&nbsp&nbspStylus Only</button>
		<button id="undo">↺ </button>
		<button id="clear">🆑</button>
	</div>

<script>
const radiobtns = document.querySelectorAll("input[type=radio]");
const radiostate = new Array(radiobtns.length).fill(false);
const cvs = document.getElementById("cvs");
const ctx = cvs.getContext("2d");
var lineWidth = 7;
var color = "#580D8B";
var mode = 1;
let isDrawing = false;
let points = [];
const xmax = 1852;
const ymax = 1080;
cvs.width = xmax;
cvs.height = ymax;
let x, y;


const strokeHistory = []

const requestIdleCallback = window.requestIdleCallback || function (fn) { setTimeout(fn, 1) };
for (let cr = 0; cr < radiobtns.length; cr++) {
	radiobtns[cr].addEventListener("click", evt => {
		if (radiostate[cr] == true) {
			radiobtns[cr].checked = false;
			radiostate[cr] = false;
		} else {
			radiobtns[cr].checked = true;
			radiostate[cr] = true;
		}
	})
}

function drawOnCanvas (stroke) {
	ctx.lineCap = "round";
	ctx.lineJoin = "round";
	const l = stroke.length - 1;
	if (stroke.length >= 3) {
		const xc = (stroke[l].x + stroke[l - 1].x) / 2;
		const yc = (stroke[l].y + stroke[l - 1].y) / 2;
		ctx.lineWidth = stroke[l - 1].lineWidth;
		ctx.strokeStyle = stroke[l - 1].color;
		if (stroke[l - 1].penType === 2) {
			ctx.globalAlpha = 0.3;
			ctx.lineCap = 'butt'
			ctx.lineJoin = 'bevel'
		} else {
			ctx.globalAlpha = 1;
			ctx.lineCap = 'round'
			ctx.lineJoin = 'round'
		}
		ctx.quadraticCurveTo(stroke[l - 1].x, stroke[l - 1].y, xc, yc);
		ctx.stroke();
		ctx.beginPath();
		ctx.moveTo(xc, yc);
	} else {
		const point = stroke[l];
		ctx.lineWidth = point.lineWidth;
		ctx.strokeStyle = point.color;
		if (point.penType === 2) {
			ctx.globalAlpha = 0.3;
			ctx.lineCap = 'butt'
			ctx.lineJoin = 'bevel'
		} else {
			ctx.globalAlpha = 1;
			ctx.lineCap = 'round'
			ctx.lineJoin = 'round'
		}
		ctx.beginPath();
		ctx.moveTo(point.x, point.y);
		ctx.stroke();
	}
}


function undoDraw () {
	strokeHistory.pop();


	ctx.clearRect(0, 0, cvs.width, cvs.height);

	for (let cc = 0; cc < strokeHistory.length; cc++) {
		ctx.strokeStyle = strokeHistory[cc].color;
		ctx.lineWidth = strokeHistory[cc].lineWidth;

		/*
		if (strokeHistory[cc].penType === 2) {
			ctx.globalAlpha = 0.3;
			ctx.lineCap = 'butt'
			ctx.lineJoin = 'bevel'
		} else {
			ctx.globalAlpha = 1;
			ctx.lineCap = 'round'
			ctx.lineJoin = 'round'
		}
		*/

		ctx.beginPath();
		let strokePath = [];
		strokeHistory[cc].map(function (point) {
			strokePath.push(point)
			drawOnCanvas(strokePath)
		})
	}
	ctx.strokeStyle = document.getElementById("palette").value;
	ctx.lineWidth = document.getElementById("lineWidthIn").value;
}

navbar.addEventListener('click', evt => {
	if (evt.target.id === 'hand') {
		mode = 0;
		document.getElementById("drawing-board").inert = true;
		document.getElementById("hand").disabled = true;
		document.getElementById("pencil").disabled = false;
		document.getElementById("highlighter").disabled = false;
	}

	if (evt.target.id === 'pencil') {
		mode = 1;
		document.getElementById("drawing-board").inert = false;
		document.getElementById("hand").disabled = false;
		document.getElementById("pencil").disabled = true;
		document.getElementById("highlighter").disabled = false;
		document.getElementById("palette").value = "#580D8B";
		document.getElementById("lineWidthIn").value = 7;
	}

	if (evt.target.id === 'highlighter') {
		mode = 2;
		document.getElementById("drawing-board").inert = false;
		document.getElementById("hand").disabled = false;
		document.getElementById("pencil").disabled = false;
		document.getElementById("highlighter").disabled = true;
		document.getElementById("palette").value = "#89E485";
		document.getElementById("lineWidthIn").value = 60;
	}

	if (evt.target.id === 'stylusbtn') {
		document.getElementById("stylusonly").click();
	}

	if (evt.target.id === 'undo') {
		undoDraw();
	}

	if (evt.target.id === 'clear') {
		if (confirm("Are you sure to clear the canvas?") === true) {
			strokeHistory.length = 0;
			ctx.clearRect(0, 0, cvs.width, cvs.height);
		}
	}

});



for (const ev of ["touchstart", "mousedown"]) {
	cvs.addEventListener(ev, function (e) {
		if (document.querySelector("#stylusonly").checked){
			if (e.touches[0].touchType === "direct") {
				return;
			}
			if (e.touches[0].radiusX != 0 && e.touches[0].radiusY != 0){
				return;
			}
		}
		ctx.strokeStyle = document.getElementById("palette").value;
		ctx.lineWidth = document.getElementById("lineWidthIn").value;

		switch(mode) {
			case 1:
				ctx.globalAlpha = 1;
				ctx.lineCap = 'round'
				ctx.lineJoin = 'round'
				break;
			case 2:
				ctx.globalAlpha = 0.3;
				ctx.lineCap = 'butt'
				ctx.lineJoin = 'bevel'
				break;
			default:
				return;
		}


		if (e.touches && e.touches[0] && typeof e.touches[0]["force"] !== "undefined") {
			x = (e.touches[0].pageX / window.innerWidth) * xmax;
			y = (e.touches[0].pageY / window.innerHeight) * ymax;
		} else {
			x = (e.pageX / window.innerWidth) * xmax;
			y = (e.pageY / window.innerHeight) * ymax;
		}
		isDrawing = true;
		penType = mode;
		color = document.getElementById("palette").value;
		lineWidth = document.getElementById("lineWidthIn").value;
		points.push({x, y, lineWidth, color, penType});
		drawOnCanvas(points);
	})
}

for (const ev of ["touchmove", "mousemove"]) {
	cvs.addEventListener(ev, function (e) {
		if (!isDrawing) return;
		if (document.querySelector("#stylusonly").checked){
			if (e.touches[0].touchType === "direct") {
				return;
			}
			if (e.touches[0].radiusX != 0 && e.touches[0].radiusY != 0){
				return;
			}
		}
		e.preventDefault();

		if (e.touches && e.touches[0] && typeof e.touches[0]["force"] !== "undefined") {
			x = (e.touches[0].pageX / window.innerWidth) * xmax;
			y = (e.touches[0].pageY / window.innerHeight) * ymax;
		} else {
			x = (e.pageX / window.innerWidth) * xmax;
			y = (e.pageY / window.innerHeight) * ymax; 
		}
		penType = mode;
		color = document.getElementById("palette").value;
		lineWidth = document.getElementById("lineWidthIn").value;
		points.push({x, y, lineWidth, color, penType});
		drawOnCanvas(points);
	})
}

for (const ev of ["touchend", "touchleave", "mouseup"]) {
	cvs.addEventListener(ev, function (e) {
		if (e.touches && e.touches[0] && typeof e.touches[0]["force"] !== "undefined") {
			x = (e.touches[0].pageX / window.innerWidth) * xmax; 
			y = (e.touches[0].pageY / window.innerHeight) * ymax;
		} else {
			x = (e.pageX / window.innerWidth) * xmax;
			y = (e.pageY / window.innerHeight) * ymax;
		}
		isDrawing = false;
		requestIdleCallback(function () { strokeHistory.push([...points]); points = []});
	})
};
</script>
</body>
</html>
