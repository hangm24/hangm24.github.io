<!DOCTYPE html>

<title>Worksheet</title>
<style>
@import url(https://fonts.googleapis.com/css?family=Andika|Boogaloo|Nunito);
* {

	color: #1D3B4F;
}

body {
	vertical-align:top;
	font-family: Andika;
	font-size: 14px;
	background-color: #454059;
	padding-right: auto;
	padding-left: auto;
}

div.paper{
	width: 74em;
	padding: 0.1em;
	border-radius: 0.1em;
	border-left: 3.5em;
	border-right: 3.5em;
	border-left-style: solid;
	border-right-style: solid;
	border-color: #F3F0F7;
	background-color: #FBF1E9;
  	column-count: 2;
 	column-height: 55.5em;
	column-fill: auto;
	column-gap: 1em;
	column-rule-style: solid;
	column-rule-width: 1px;
	column-rule-color: #E4DAF2;

}

h1 {
	font-size: 21px;
	font-family: Boogaloo;
	text-align: center;
	font-weight: normal;
	padding-left: 1rem;
	padding-right: 1rem;
}

h2 {
	font-size: 16px;
	text-decoration: underline;
	padding-left: 1rem;
	padding-right: 1rem;
}

p {
	vertical-align: baseline;
	padding-left: 1rem;
	padding-right: 1rem;
	text-align: justify;
}
div.table1 {
	padding-left: 1rem;
	padding-right: 1rem;
}
div.t1num {
	display: inline-block;
	width: 1.5em;
}
div.t1cont {
	display: inline-block;
	width: 29em;
	text-align: justify;
}
div.table2 {
	padding-left: 2rem;
	padding-right: 1rem;

}
div.t2num {
	display: inline-block;
	width: 1.5em;
}
div.t2cont {
	display: inline-block;
	width: 13em;
	text-align: justify;
}

div.table3 {
	padding-left: 2rem;
	padding-right: 1rem;

}
div.t3num {
	display: inline-block;
	width: 1.5em;
}
div.t3cont {
	display: inline-block;
	width: 7em;
}

div.table4 {
	padding-left: 2rem;
	padding-right: 1rem;

}
div.t4num {
	display: inline-block;
	width: 1.5em;
}
div.t4cont {
	display: inline-block;
	width: 5em;
}
label.eqn {
	vertical-align:baseline;
}
label.frac {
	vertical-align:baseline;
	font-size: 1.5em;
}
</style>

<script>
	MathJax = {
		tex: {

<script>
	const $webtitle = document.querySelector("title");
	const $wstitle = document.querySelector("#wstitle");
	const $eqns = document.querySelectorAll(".eqn");
	const $fracs = document.querySelectorAll(".frac");
	$webtitle.innerHTML = $wstitle.innerText;
	$eqns.forEach($eqn => $eqn.innerHTML = "#"+ $eqn.innerHTML +"#");
	$fracs.forEach($frac => $frac.innerHTML = "#"+ $frac.innerHTML +"#");
