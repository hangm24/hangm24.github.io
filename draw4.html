<!DOCTYPE html>	
<html lang="en">


<link rel="stylesheet" href="radiocheck.css">
<style>
body {
	position: absolute;
	display:flex;
	margin: 0;
	left: 0;
	top: 0;
	width: 100%;
	height: 100%;
	font-family: sans-serif;
	font-size: 13px;
	padding: 1em;
	box-sizing: border-box;
	justify-content: center; 
	align-items: center
}

div.layer-top {justify-content: center; align-items: center}
canvas {
	background-color: #FFF9F4;
	height: min(98vh,57vw); 
	width: min(172vh,98.6vw);
}

#navbar {
	z-index: 1;
	position: absolute;
	bottom: 2.5%;
	background: #99BBEE;
	font-size: max(14px,2vh);
	opacity: 0.92;
	padding: 0.2%;
	border-radius: 0.2em;
}

</style>
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, user-scalable=no"	/>
	<title>Canvas</title>
</head>

<body>
	<canvas id="cvs">Sorry, your browser is too old for the canvas.</canvas>

	<div id="navbar">
		<input type='file' id="rawdata" accept=".html">
		<button id="import" onclick="document.querySelector('#rawdata').click()">Import</button>
		<button id="exportlog">Export Log</button>
		<input type="text" id="commandline" placeholder="[Press Enter to Command]" onfocus="this.placeholder=''" onblur="this.placeholder='[Press Enter to Command]'">
		<button id="hand" disabled>🖐</button>
		<button id="pencil">🖊️</button>
		<button id="highlighter">🖍️</button>
		<input id="palette" name='stroke' type="color" value="#580D8B">
		<input id="lineWidthIn" name='lineWidth' type="number" value="7">
		<button id="backwardbtn">◀</button>
		<button id="forwardbtn">▶</button>
		<button id="smoothen">∿</button>
		<button id="straighten">╱</button>
		<button id="undo">↺</button>
		<button id="clear">🆑</button>
		<button id="stylusbtn"><input type="radio" id="stylusonly">&nbsp&nbspStylus Only</button>
	</div>
</body>
<script src="radiocheck.js"></script>
<script>
const radiobtns = document.querySelectorAll("input[type=radio]");
const radiostate = new Array(radiobtns.length).fill(false);
const cvs = document.getElementById("cvs")
const ctx = cvs.getContext('2d')
let lineWidth = 0
let isMousedown = false
let points = []
const xmax = 1852;
const ymax = 1080;
cvs.width = xmax;
cvs.height = ymax;
let xoff=0;
let yoff=0;

const strokeHistory = []

const requestIdleCallback = window.requestIdleCallback || function (fn) { setTimeout(fn, 1) };

for (let cr = 0; cr < radiobtns.length; cr++) {
	radiobtns[cr].addEventListener('click', evt => {
		if (radiostate[cr] == true) {
			radiobtns[cr].checked = false;
			radiostate[cr] = false;
		} else {
			radiobtns[cr].checked = true;
			radiostate[cr] = true;
		}
	})

}

function drawOnCanvas (stroke) {
	ctx.strokeStyle = 'black'
	ctx.lineCap = 'round'
	ctx.lineJoin = 'round'

	const l = stroke.length - 1
	if (stroke.length >= 3) {
		const xc = (stroke[l].x + stroke[l - 1].x) / 2
		const yc = (stroke[l].y + stroke[l - 1].y) / 2
		ctx.lineWidth = stroke[l - 1].lineWidth
		ctx.quadraticCurveTo(stroke[l - 1].x, stroke[l - 1].y, xc, yc)
		ctx.stroke()
		ctx.beginPath()
		ctx.moveTo(xc, yc)
	} else {
		const point = stroke[l];
		ctx.lineWidth = point.lineWidth
		ctx.strokeStyle = point.color
		ctx.beginPath()
		ctx.moveTo(point.x, point.y)
		ctx.stroke()
	}
}


function undoDraw () {
	strokeHistory.pop()
	ctx.clearRect(0, 0, cvs.width, cvs.height)

	strokeHistory.map(function (stroke) {
		if (strokeHistory.length === 0) return

		ctx.beginPath()

		let strokePath = [];
		stroke.map(function (point) {
			strokePath.push(point)
			drawOnCanvas(strokePath)
		})
	})
}

navbar.addEventListener('change', evt => {

    if(evt.target.id === "lineWidthIn") {
		let input = parseInt(evt.target.value);
		if (isNaN(input)) {
			evt.target.value = ctx.lineWidth;
		} else {
			ctx.lineWidth = input;
		}
    }
    
});



navbar.addEventListener('click', evt => {


	if (evt.target.id === 'hand') {
		mode = 0;
		document.getElementById("drawing-board").inert = true;
		document.getElementById("hand").disabled = true;
		document.getElementById("pencil").disabled = false;
		document.getElementById("highlighter").disabled = false;


	}


	if (evt.target.id === 'pencil') {
		mode = 1;
		document.getElementById("drawing-board").inert = false;
		document.getElementById("hand").disabled = false;
		document.getElementById("pencil").disabled = true;
		document.getElementById("highlighter").disabled = false;
		document.getElementById("palette").value = "#580D8B";
		document.getElementById("lineWidthIn").value = 7;
	}

	if (evt.target.id === 'highlighter') {
		mode = 2;
		document.getElementById("drawing-board").inert = false;
		document.getElementById("hand").disabled = false;
		document.getElementById("pencil").disabled = false;
		document.getElementById("highlighter").disabled = true;
		document.getElementById("palette").value = "#89E485";
		document.getElementById("lineWidthIn").value = 60;
	}

	if (evt.target.id === 'stylusbtn') {
		document.getElementById("stylusonly").click();
	}

	if (evt.target.id === 'smoothen') {
		let oldHistory = [];
		let shid = strokeHistory.length - 1;
		let ptid = strokeHistory[shid].length;
		oldHistory = strokeHistory[shid].slice();
		for (let cb = 1; cb < strokeHistory[shid].length-1; cb++){
			strokeHistory[shid][cb].x = 0.4 * oldHistory[cb].x + 0.3 * oldHistory[cb-1].x + 0.3 * oldHistory[cb+1].x;
			strokeHistory[shid][cb].y = 0.4 * oldHistory[cb].y + 0.3 * oldHistory[cb-1].y + 0.3 * oldHistory[cb+1].y;
		}


		ctx.clearRect(0, 0, cvs.width, cvs.height);

		for (let cc = 0; cc < strokeHistory.length; cc++) {
			ctx.strokeStyle = strokeHistory[cc].color;
			ctx.lineWidth = strokeHistory[cc].lineWidth;


			switch (strokeHistory[cc].penType) {
				case 1:
					ctx.globalAlpha = 1;
					ctx.lineCap = 'round'
					ctx.lineJoin = 'round'
					break;
				case 2:
					ctx.globalAlpha = 0.3;
					ctx.lineCap = 'butt'
					ctx.lineJoin = 'bevel'
					break;
				default:
					return;
			}

			ctx.beginPath();
			let strokePath = [];
			strokeHistory[cc].map(function (point) {
				strokePath.push(point)
				pencilDraw(strokePath)
			})
		}
		ctx.strokeStyle = document.getElementById("palette").value;
		ctx.lineWidth = document.getElementById("lineWidthIn").value;
	}


	if (evt.target.id === 'straighten') {
		let shid = strokeHistory.length - 1;
		let ptid = strokeHistory[shid].length;
		for (let cb = 0; cb < strokeHistory[shid].length - 1; cb++){
			strokeHistory[shid][cb].x = (strokeHistory[shid][0].x * (ptid - cb) + strokeHistory[shid][ptid-1].x * cb)/ptid;
			strokeHistory[shid][cb].y = (strokeHistory[shid][0].y * (ptid - cb) + strokeHistory[shid][ptid-1].y * cb)/ptid;
		}


		ctx.clearRect(0, 0, cvs.width, cvs.height);

		for (let cc = 0; cc < strokeHistory.length; cc++) {
			ctx.strokeStyle = strokeHistory[cc].color;
			ctx.lineWidth = strokeHistory[cc].lineWidth;


			if (strokeHistory[cc].penType === 2) {
				ctx.globalAlpha = 0.3;
				ctx.lineCap = 'butt'
				ctx.lineJoin = 'bevel'
			} else {
				ctx.globalAlpha = 1;
				ctx.lineCap = 'round'
				ctx.lineJoin = 'round'
			}

			ctx.beginPath();
			let strokePath = [];
			strokeHistory[cc].map(function (point) {
				strokePath.push(point)
				pencilDraw(strokePath)
			})
		}
		ctx.strokeStyle = document.getElementById("palette").value;
		ctx.lineWidth = document.getElementById("lineWidthIn").value;

	}

	if (evt.target.id === 'undo') {

		strokeHistory.pop();


		ctx.clearRect(0, 0, cvs.width, cvs.height);

		for (let cc = 0; cc < strokeHistory.length; cc++) {
			ctx.strokeStyle = strokeHistory[cc].color;
			ctx.lineWidth = strokeHistory[cc].lineWidth;


			if (strokeHistory[cc].penType === 2) {
				ctx.globalAlpha = 0.3;
				ctx.lineCap = 'butt'
				ctx.lineJoin = 'bevel'
			} else {
				ctx.globalAlpha = 1;
				ctx.lineCap = 'round'
				ctx.lineJoin = 'round'
			}

			ctx.beginPath();
			let strokePath = [];
			strokeHistory[cc].map(function (point) {
				strokePath.push(point)
				pencilDraw(strokePath)
			})
		}
		ctx.strokeStyle = document.getElementById("palette").value;
		ctx.lineWidth = document.getElementById("lineWidthIn").value;
	}

	if (evt.target.id === 'clear') {
		if (confirm("Are you sure to clear the canvas?") === true) {
			strokeHistory.length = 0;


			ctx.clearRect(0, 0, cvs.width, cvs.height);
		}

	}



});




for (const ev of ["touchstart", "mousedown"]) {
	cvs.addEventListener(ev, function (e) {
		if (document.querySelector('#stylusonly').checked){
			if (e.touches[0].touchType === 'direct') {
				return;
			}
			if (e.touches[0].radiusX != 0 && e.touches[0].radiusY != 0){
				return;
			}
		}
		let pressure = 0.1;
		let x, y;



		if (e.touches && e.touches[0] && typeof e.touches[0]["force"] !== "undefined") {
			if (e.touches[0]["force"] > 0) {
				pressure = e.touches[0]["force"]
			}
			x = ((e.touches[0].pageX - xoff) / window.innerWidth) * xmax 
			y = ((e.touches[0].pageY - yoff) / window.innerHeight) * ymax
		} else {
			pressure = 1.0
			x = ((e.pageX-xoff) / window.innerWidth) * xmax
			y = ((e.pageY-yoff) / window.innerHeight) * ymax 
		}

		isMousedown = true

		lineWidth = Math.log(pressure + 1) * 40
		ctx.lineWidth = lineWidth// pressure * 50;

		points.push({ x, y, lineWidth })
		drawOnCanvas(points)
	})
}

for (const ev of ['touchmove', 'mousemove']) {
	cvs.addEventListener(ev, function (e) {
		if (!isMousedown) return
		if (document.querySelector('#stylusonly').checked){
			if (e.touches[0].touchType === 'direct') {
				return;
			}
			if (e.touches[0].radiusX != 0 && e.touches[0].radiusY != 0){
				return;
			}
		}
		e.preventDefault()

		let pressure = 0.1
		let x, y



		if (e.touches && e.touches[0] && typeof e.touches[0]["force"] !== "undefined") {
			if (e.touches[0]["force"] > 0) {
				pressure = e.touches[0]["force"]
			}
			x = ((e.touches[0].pageX - xoff) / window.innerWidth) * xmax 
			y = ((e.touches[0].pageY - yoff) / window.innerHeight) * ymax
		} else {
			pressure = 1.0
			x = ((e.pageX-xoff) / window.innerWidth) * xmax
			y = ((e.pageY-yoff) / window.innerHeight) * ymax 
		}

		// smoothen line width
		lineWidth = (Math.log(pressure + 1) * 40 * 0.2 + lineWidth * 0.8)
		points.push({ x, y, lineWidth })

		drawOnCanvas(points);

		requestIdleCallback(() => {
			$force.textContent = 'force = ' + pressure

			const touch = e.touches ? e.touches[0] : null
			if (touch) {
				$touches.innerHTML = `
					touchType = ${touch.touchType} ${touch.touchType === 'direct' ? '👆' : '✍️'} <br/>
					radiusX = ${touch.radiusX} <br/>
					radiusY = ${touch.radiusY} <br/>
					rotationAngle = ${touch.rotationAngle} <br/>
					altitudeAngle = ${touch.altitudeAngle} <br/>
					azimuthAngle = ${touch.azimuthAngle} <br/>
				`
			}
		})
	})
}

for (const ev of ['touchend', 'touchleave', 'mouseup']) {
	cvs.addEventListener(ev, function (e) {
		let pressure = 0.1;
		let x, y;

		if (e.touches && e.touches[0] && typeof e.touches[0]["force"] !== "undefined") {
			if (e.touches[0]["force"] > 0) {
				pressure = e.touches[0]["force"]
			}
			x = ((e.touches[0].pageX - xoff) / window.innerWidth) * xmax 
			y = ((e.touches[0].pageY - yoff) / window.innerHeight) * ymax
		} else {
			pressure = 1.0
			x = ((e.pageX-xoff) / window.innerWidth) * xmax
			y = ((e.pageY-yoff) / window.innerHeight) * ymax 
		}

		isMousedown = false

		requestIdleCallback(function () { strokeHistory.push([...points]); points = []})

		lineWidth = 0
	})
};

</script>


</html>
