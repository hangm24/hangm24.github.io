<html>

<head>

<style>
body {
	display: flex;
	background-color: #454059;
	margin-left:auto;
	margin-right:auto;
	justify-content: center;
	align-items: center;
}
div {
	height: 560px;
	width: 965px;
	background-color: #FFF9F4;
}
</style>

</head>
<body>
<div>
	<p id="output1"></p>
	<p id="output2"></p>
</div>
<script>
	document.getElementById("output1").innerText = "Window Size: "+ window.innerWidth + "," + window.innerHeight;
	document.getElementById("output2").innerText = "Screen Size: "+ screen.width + "," + screen.height;
</script>
	
</body>
</html>
